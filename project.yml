name: LedgerLite

options:
  bundleIdPrefix: com.enes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""  # Set in Local.xcconfig (gitignored) — see Local.xcconfig.template

schemes:

  # The LedgerLiteWidget target contains two widget kinds.
  # Xcode requires _XCWidgetKind to know which one to launch when debugging.
  # Use "LedgerLiteTodayWidget" scheme for the today widget,
  # and "LedgerLiteSubscriptionsWidget" for the subscriptions widget.

  LedgerLiteTodayWidget:
    build:
      targets:
        LedgerLiteWidget: all
    run:
      config: Debug
      environmentVariables:
        _XCWidgetKind: LedgerLiteTodayWidget
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  LedgerLiteSubscriptionsWidget:
    build:
      targets:
        LedgerLiteWidget: all
    run:
      config: Debug
      environmentVariables:
        _XCWidgetKind: LedgerLiteSubscriptionsWidget
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:

  LedgerLite:
    type: application
    platform: iOS
    sources:
      - path: LedgerLite
    info:
      path: LedgerLite/Resources/Info.plist
      properties:
        CFBundleDisplayName: LedgerLite
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - es
          - ru
          - kk
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Used to lock LedgerLite and protect your financial data."
    entitlements:
      path: LedgerLite/Resources/LedgerLite.entitlements
      properties:
        # TODO: Phase 7.5 + paid Apple Developer Program — add iCloud.com.enes.ledgerlite
        # (Personal Team cannot use iCloud capability on device).
        # Register group.com.enes.ledgerlite at
        # https://developer.apple.com/account/resources/identifiers/list/applicationGroup
        com.apple.security.application-groups:
          - group.com.enes.ledgerlite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enes.ledgerlite
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: LedgerLiteWidget

  LedgerLiteWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: LedgerLiteWidget
      - path: LedgerLite/Models
        excludes:
          - SubscriptionCandidate.swift  # references SubscriptionDetector (Services), not needed in widget
      - path: LedgerLite/Utilities
        excludes:
          - PreviewContainer.swift   # preview-only; not needed in widget target
      - path: LedgerLite/Services/WidgetDataService.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: SwiftData.framework
    info:
      path: LedgerLiteWidget/Info.plist
      properties:
        CFBundleDisplayName: LedgerLite Widget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: LedgerLiteWidget/LedgerLiteWidget.entitlements
      properties:
        # Widget reads the shared SwiftData store via the App Group.
        # No CloudKit entitlement needed — only the main app syncs.
        com.apple.security.application-groups:
          - group.com.enes.ledgerlite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enes.ledgerlite.widget
        SKIP_INSTALL: "YES"

  LedgerLiteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LedgerLiteTests
    resources:
      - path: LedgerLiteTests/Fixtures
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enes.ledgerlite.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: LedgerLite
