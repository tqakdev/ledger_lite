name: LedgerLite

options:
  bundleIdPrefix: com.enes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    DEVELOPMENT_TEAM: ""  # Set in Local.xcconfig (gitignored) — see Local.xcconfig.template

schemes:

  # Primary app scheme. Defined explicitly so the test bundle is wired into the
  # Test action — otherwise ⌘U / `xcodebuild test` runs zero tests against a
  # silently-empty test action.
  LedgerLite:
    build:
      targets:
        LedgerLite: all
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - LedgerLiteTests
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  # The LedgerLiteWidget target contains three widget kinds. Xcode requires
  # _XCWidgetKind to know which one to launch when debugging, so each kind
  # gets its own scheme: "LedgerLiteRunwayWidget", "LedgerLiteTodayWidget",
  # and "LedgerLiteSubscriptionsWidget". Run `xcodegen generate` after
  # editing this file so the schemes exist locally (they are not committed).

  LedgerLiteRunwayWidget:
    build:
      targets:
        LedgerLiteWidget: all
    run:
      config: Debug
      environmentVariables:
        _XCWidgetKind: LedgerLiteRunwayWidget
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  LedgerLiteTodayWidget:
    build:
      targets:
        LedgerLiteWidget: all
    run:
      config: Debug
      environmentVariables:
        _XCWidgetKind: LedgerLiteTodayWidget
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  LedgerLiteSubscriptionsWidget:
    build:
      targets:
        LedgerLiteWidget: all
    run:
      config: Debug
      environmentVariables:
        _XCWidgetKind: LedgerLiteSubscriptionsWidget
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:

  LedgerLite:
    type: application
    platform: iOS
    sources:
      - path: LedgerLite
    info:
      path: LedgerLite/Resources/Info.plist
      properties:
        CFBundleDisplayName: Ledger Lite
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - es
          - ru
          - kk
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Used to lock LedgerLite and protect your financial data."
        NSCameraUsageDescription: "Used to scan receipts. Receipts are read on your device and never uploaded."
        NSUserActivityTypes:
          - com.apple.corespotlightitem
        CFBundleURLTypes:
          - CFBundleURLName: com.enes.ledgerlite
            CFBundleURLSchemes:
              - ledgerlite
    entitlements:
      path: LedgerLite/Resources/LedgerLite.entitlements
      properties:
        # iCloud sync (Phase 7.5) — uncomment after upgrading to paid Apple Developer Account:
        # com.apple.developer.icloud-services:
        #   - CloudKit
        # com.apple.developer.icloud-container-identifiers:
        #   - iCloud.com.enes.ledgerlite
        # Then change cloudKitDatabase: .none → .private in LedgerLiteApp.makeContainer().
        com.apple.security.application-groups:
          - group.com.enes.ledgerlite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enes.ledgerlite
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: LedgerLiteWidget

  LedgerLiteWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: LedgerLiteWidget
      - path: LedgerLite/Models
        excludes:
          - SubscriptionCandidate.swift  # references SubscriptionDetector (Services), not needed in widget
      - path: LedgerLite/Utilities
        excludes:
          - PreviewContainer.swift   # preview-only; not needed in widget target
          - ScreenshotSeeder.swift   # DEBUG screenshot data; app target only
      - path: LedgerLite/Services/WidgetDataService.swift
      # Shared localizations so widget-facing strings (Payday Runway, Today's
      # Total, …) are translated in the widget bundle too.
      - path: LedgerLite/Resources/en.lproj
        buildPhase: resources
      - path: LedgerLite/Resources/es.lproj
        buildPhase: resources
      - path: LedgerLite/Resources/ru.lproj
        buildPhase: resources
      - path: LedgerLite/Resources/kk.lproj
        buildPhase: resources
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: SwiftData.framework
    info:
      path: LedgerLiteWidget/Info.plist
      properties:
        CFBundleDisplayName: LedgerLite Widget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleLocalizations:
          - en
          - es
          - ru
          - kk
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: LedgerLiteWidget/LedgerLiteWidget.entitlements
      properties:
        # Widget reads the shared SwiftData store via the App Group.
        # No CloudKit entitlement needed — only the main app syncs.
        com.apple.security.application-groups:
          - group.com.enes.ledgerlite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enes.ledgerlite.widget
        SKIP_INSTALL: "YES"

  LedgerLiteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LedgerLiteTests
    resources:
      - path: LedgerLiteTests/Fixtures
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enes.ledgerlite.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: LedgerLite
