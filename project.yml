name: LedgerLite

options:
  bundleIdPrefix: com.enes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""  # TODO: set your Apple Developer Team ID (e.g. "ABCDE12345")

targets:

  LedgerLite:
    type: application
    platform: iOS
    sources:
      - path: LedgerLite
    info:
      path: LedgerLite/Resources/Info.plist
      properties:
        CFBundleDisplayName: LedgerLite
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: LedgerLite/Resources/LedgerLite.entitlements
      properties:
        # TODO: CLOUDKIT — register iCloud.com.enes.ledgerlite at
        # https://developer.apple.com/account/resources/icloud/list
        # and group.com.enes.ledgerlite at
        # https://developer.apple.com/account/resources/identifiers/list/applicationGroup
        # Then set DEVELOPMENT_TEAM above and re-run xcodegen generate.
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.enes.ledgerlite
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.security.application-groups:
          - group.com.enes.ledgerlite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enes.ledgerlite
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: LedgerLiteWidget

  LedgerLiteWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: LedgerLiteWidget
    info:
      path: LedgerLiteWidget/Info.plist
      properties:
        CFBundleDisplayName: LedgerLite Widget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: LedgerLiteWidget/LedgerLiteWidget.entitlements
      properties:
        # Widget reads the shared SwiftData store via the App Group.
        # No CloudKit entitlement needed — only the main app syncs.
        com.apple.security.application-groups:
          - group.com.enes.ledgerlite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enes.ledgerlite.widget
        SKIP_INSTALL: "YES"

  LedgerLiteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LedgerLiteTests
    resources:
      - path: LedgerLiteTests/Fixtures
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enes.ledgerlite.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: LedgerLite
